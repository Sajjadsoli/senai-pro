<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SenAI Pro{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🛡️</span>
                    <span class="logo-text">SenAI Pro</span>
                </div>
                <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                    <span class="nav-icon">📊</span> داشبورد
                </a>
                <a href="/domains" class="nav-item {% if request.path == '/domains' %}active{% endif %}">
                    <span class="nav-icon">🌐</span> دامنه‌ها
                </a>
                <a href="/ssl" class="nav-item {% if request.path == '/ssl' %}active{% endif %}">
                    <span class="nav-icon">🔒</span> SSL
                </a>
                <a href="/anti-filter" class="nav-item {% if request.path == '/anti-filter' %}active{% endif %}">
                    <span class="nav-icon">🛡️</span> ضد‌فیلتر
                </a>
                <a href="/firewall" class="nav-item {% if request.path == '/firewall' %}active{% endif %}">
                    <span class="nav-icon">🔥</span> فایروال
                </a>
                <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
                    <span class="nav-icon">⚙️</span> تنظیمات
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/logout" class="logout-btn">
                    <span>🚪</span> خروج
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <h1 class="page-title">{% block page_title %}داشبورد{% endblock %}</h1>
                <div class="topbar-right">
                    <span class="status-dot" id="serverStatus"></span>
                    <span class="status-text" id="statusText">آنلاین</span>
                </div>
            </header>

            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
